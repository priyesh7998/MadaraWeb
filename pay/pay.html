<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Buy Me Coffee</title>


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap');

        body{
            background: #000;
        }
        .mw-page {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center ;
            justify-content: center;  
        }

        .mw-card {
            width: 440px;
            width: 440px;
            background: #131c24;
            border: 1px solid rgba(0, 229, 160, 0.12);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            
            margin: 0 auto;
        }

        .mw-glow {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(0, 229, 160, 0.22) 0%, transparent 70%);
            pointer-events: none;
        }

        .mw-eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: #00e5a0;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mw-eyebrow::before,
        .mw-eyebrow::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 1.5px;
            background: #00e5a0;
            border-radius: 2px;
        }

        .mw-logo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            position: relative;
        }

        .mw-logo span {
            color: #00e5a0;
        }

        .mw-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: #7a9aad;
            line-height: 1.65;
            margin-bottom: 1.75rem;
            position: relative;
        }

        .mw-amounts {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            position: relative;
        }

        .mw-amt {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            color: #cde8e0;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            outline: none;
        }

        .mw-amt:hover {
            border-color: rgba(0, 229, 160, 0.4);
            color: #00e5a0;
        }

        .mw-amt.active {
            background: #00b87d;
            border-color: #00b87d;
            color: #052e1e;
            font-weight: 600;
        }

        .mw-input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 1.25rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
            text-align: center;
            position: relative;
        }

        .mw-input::placeholder {
            color: #3d6659;
        }

        .mw-input:focus {
            border-color: rgba(0, 229, 160, 0.45);
        }

        .mw-btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: #00b87d;
            color: #052e1e;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.01em;
            position: relative;
        }

        .mw-btn:hover {
            background: #00e5a0;
            transform: scale(1.01);
        }

        .mw-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 1.5rem 0 1rem;
        }

        .mw-upi {
            color: #3d6659;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mw-upi i {
            font-size: 14px;
            color: #00b87d;
        }

        .mw-upi strong {
            color: #00b87d;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="mw-page">
        <div class="mw-card">
            <div class="mw-glow"></div>
            <div class="mw-eyebrow">Support Our Work</div>
            <div class="mw-logo">Madara<span>Web</span></div>
            <p class="mw-tag">We design high-performing websites & AI-powered systems.<br>Your support helps us keep
                building — automatically.</p>
            <div class="mw-amounts">
                <button class="mw-amt" onclick="setAmt(99,this)">₹99</button>
                <button class="mw-amt" onclick="setAmt(299,this)">₹299</button>
                <button class="mw-amt" onclick="setAmt(499,this)">₹499</button>
            </div>
            <input type="number" id="mwAmount" class="mw-input" placeholder="Enter custom amount" min="1" />
            <button class="mw-btn" id="mwPay">Pay with UPI →</button>
            <hr class="mw-divider" />
            <div class="mw-upi"><i class="ti ti-shield-check" aria-hidden="true"></i>UPI ID:
                <strong>Priyesh_7998@kotak</strong></div>
        </div>
    </div>

    <script>
        function setAmt(v, el) {
            document.getElementById('mwAmount').value = v;
            document.querySelectorAll('.mw-amt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        document.getElementById('mwAmount').addEventListener('input', function () {
            document.querySelectorAll('.mw-amt').forEach(b => b.classList.remove('active'));
        });
        document.getElementById('mwPay').addEventListener('click', function () {
            const amt = document.getElementById('mwAmount').value || 1;
            window.location.href = `upi://pay?pa=9262665260@kotakbank&pn=Madara%20Web&am=${amt}&cu=INR`;
        });
    </script>
</body>

</html>
